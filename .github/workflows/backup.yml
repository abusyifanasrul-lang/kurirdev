name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dump Database
        run: |
          # Menggunakan IPv4 dan opsi -h secara eksplisit untuk keamanan
          pg_dump "${{ secrets.DB_URL }}" > backup_$(date +%Y-%m-%d).sql
        env:
          # Memaksa PostgreSQL menggunakan IPv4 jika memungkinkan
          PGOPTIONS: "-c statement_timeout=60000" 

      - name: Upload Backup to GitHub
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup_*.sql
          retention-days: 30
